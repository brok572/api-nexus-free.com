<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Free API</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:#05010a;color:#fff;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,#7c3aed55 0%,transparent 50%),radial-gradient(circle at 80% 80%,#ec489955 0%,transparent 50%)}
.hero{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;position:relative;z-index:1}
h1{font-size:80px;font-weight:800;background:linear-gradient(90deg,#a855f7,#ec4899,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px}
p{font-size:22px;color:#c4b5fd;margin-bottom:40px}
.btn{padding:18px 50px;background:linear-gradient(90deg,#a855f7,#ec4899);border-radius:999px;text-decoration:none;color:#0f172a;font-weight:800;font-size:20px;box-shadow:0 0 40px #a855f799;transition:0.3s}
.btn:hover{transform:scale(1.05)}
@media(max-width:768px){h1{font-size:48px}p{font-size:18px}}
</style>
</head>
<body>
<div class="hero">
  <h1>Nexus Free API</h1>
  <p>100+ Free APIs. Fast. Simple. No Key Required.</p>
  <a href="/categories.html" class="btn">Explore APIs</a>
</div>
</body>
</html>
