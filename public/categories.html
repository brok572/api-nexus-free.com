<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Docs - Nexus</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #05010a;
  --card: rgba(20, 0, 35, 0.6);
  --border: #6d28d955;
  --purple: #a855f7;
  --pink: #ec4899;
  --text: #e5e7eb;
  --muted: #a78bfa;
}

* {margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}

body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 100px;
}

body::before {
  content:'';
  position:fixed;
  inset:0;
  background: radial-gradient(circle at 20% 20%,#7c3aed33 0%,transparent 50%), 
              radial-gradient(circle at 80% 80%,#ec489933 0%,transparent 50%);
  pointer-events:none;
}

nav {
  padding:20px 40px;
  background:rgba(10,0,20,0.8);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:10;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav-left {
  display:flex;
  align-items:center;
  gap:12px;
}

.dots {
  display:flex;
  gap:6px;
}

.dot {
  width:8px;
  height:8px;
  border-radius:50%;
  background:linear-gradient(90deg,var(--purple),var(--pink));
}

.nav-right .btn-sm {
  padding:10px 20px;
  background:linear-gradient(90deg,var(--purple),var(--pink));
  border:none;
  border-radius:10px;
  color:#0f172a;
  font-weight:700;
  cursor:pointer;
  font-size:14px;
}

.container {
  max-width:1300px;
  margin:0 auto;
  padding:40px 24px;
}

/* Hero Banner */
.hero-banner {
  width:100%;
  height:280px;
  border-radius:24px;
  overflow:hidden;
  margin-bottom:40px;
  position:relative;
  border:1px solid var(--border);
}

.hero-banner img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero-overlay {
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,transparent 0%,rgba(5,1,10,0.9) 100%);
  display:flex;
  align-items:flex-end;
  padding:40px;
}

.hero-overlay h1 {
  font-size:42px;
  font-weight:800;
  background:linear-gradient(90deg,#c4b5fd,#f0abfc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* Search */
.search-box {
  margin-bottom:50px;
}

.search-box input {
  width:100%;
  padding:18px 24px;
  border-radius:16px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  font-size:16px;
  backdrop-filter:blur(10px);
}

.search-box input:focus {
  outline:none;
  border-color:var(--purple);
  box-shadow:0 0 0 3px #a855f733;
}

h2 {
  font-size:42px;
  font-weight:800;
  margin-bottom:32px;
  background:linear-gradient(90deg,#c4b5fd,#f0abfc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:24px;
}

.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:32px;
  cursor:pointer;
  transition:0.3s;
  backdrop-filter:blur(10px);
}

.card:hover {
  transform:translateY(-8px);
  border-color:var(--purple);
  box-shadow:0 20px 60px #a855f733;
}

.card h3 {
  font-size:28px;
  font-weight:700;
  margin-bottom:12px;
  color:#f0abfc;
}

.card p {
  color:var(--muted);
  margin-bottom:16px;
}

.badge {
  display:inline-block;
  padding:8px 18px;
  background:#7c3aed33;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
  color:#c4b5fd;
}

.endpoint-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  margin-bottom:20px;
  overflow:hidden;
  backdrop-filter:blur(10px);
}

.ep-header {
  padding:24px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:16px;
  transition:0.2s;
}

.ep-header:hover {
  background:rgba(124,58,233,0.1);
}

.method {
  padding:6px 14px;
  border-radius:8px;
  font-size:12px;
  font-weight:800;
  background:linear-gradient(90deg,#22c55e,#16a34a);
  color:#000;
}

.ep-path {
  font-family:'JetBrains Mono',monospace;
  font-size:15px;
  color:#c4b5fd;
}

.ep-body {
  display:none;
  border-top:1px solid var(--border);
}

.ep-body.active {display:block}

.ep-section {
  padding:28px;
  border-bottom:1px solid var(--border);
}

.ep-section:last-child {border-bottom:none}

.ep-section h4 {
  font-size:16px;
  font-weight:700;
  margin-bottom:16px;
  color:#d8b4fe;
  display:flex;
  align-items:center;
  gap:8px;
}

input[type="text"] {
  width:100%;
  padding:14px 18px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(10,0,20,0.8);
  color:var(--text);
  font-size:15px;
  font-family:'JetBrains Mono',monospace;
}

.btn {
  padding:14px 32px;
  background:linear-gradient(90deg,var(--purple),var(--pink));
  border:none;
  border-radius:12px;
  color:#0f172a;
  font-weight:800;
  cursor:pointer;
  font-size:15px;
  display:inline-flex;
  align-items:center;
  gap:8px;
}

.tabs {
  display:flex;
  gap:8px;
  margin-bottom:16px;
  border-bottom:1px solid var(--border);
}

.tab {
  padding:12px 20px;
  background:transparent;
  border:none;
  color:var(--muted);
  cursor:pointer;
  font-weight:600;
  border-bottom:2px solid transparent;
}

.tab.active {
  color:var(--text);
  border-bottom-color:var(--purple);
}

.code-block {
  background:#000;
  border-radius:12px;
  padding:20px;
  overflow-x:auto;
  position:relative;
}

.code-block pre {
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  color:#c4b5fd;
}

.copy-btn {
  position:absolute;
  top:12px;
  right:12px;
  padding:6px 12px;
  background:rgba(124,58,233,0.3);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  cursor:pointer;
  font-size:12px;
  font-weight:600;
}

.status-table {
  width:100%;
  border-collapse:collapse;
}

.status-table td {
  padding:12px 16px;
  border-bottom:1px solid var(--border);
}

.status-ok {color:#22c55e}
.status-err {color:#ef4444}
.status-warn {color:#f59e0b}

/* Bottom Nav */
.bottom-nav {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:rgba(10,0,20,0.95);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;
  justify-content:space-around;
  padding:16px 0;
  z-index:10;
}

.nav-item {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  color:var(--muted);
  text-decoration:none;
  font-size:12px;
  font-weight:600;
  transition:0.2s;
}

.nav-item.active,
.nav-item:hover {
  color:var(--purple);
}

.nav-item svg {
  width:24px;
  height:24px;
  fill:currentColor;
}

.icon {
  width:20px;
  height:20px;
  fill:currentColor;
}

.back {
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-bottom:30px;
  color:#a5b4fc;
  text-decoration:none;
  font-weight:600;
}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <h1 style="font-size:24px;background:linear-gradient(90deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800;">Nexus</h1>
  </div>
  <div class="nav-right">
    <button class="btn-sm">Get Started</button>
  </div>
</nav>

<div class="container">
  <div id="catView">
    <!-- Hero Banner -->
    <div class="hero-banner">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQfzl-IUu5HC18DZVE6dBV7lmj2iWt8CC4E7nBSFGxFZg&s=10" alt="Hero">
      <div class="hero-overlay">
        <h1>Explore 100+ Free APIs</h1>
      </div>
    </div>

    <!-- Search -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search APIs..." onkeyup="searchApis()">
    </div>

    <h2>Categories</h2>
    <div id="catGrid" class="grid"></div>
  </div>

  <div id="epView" style="display:none">
    <a href="#" class="back" onclick="showCats()">
      <svg class="icon" viewBox="0 0 24 24"><path d="M11.67 3.87L9.9 2.1 0 12l9.9 9.9 1.77-1.77L3.54 12z"/></svg>
      Back to Categories
    </a>
    <h2 id="catTitle"></h2>
    <div id="epList"></div>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <a href="/" class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>Home</span>
  </a>
  <a href="#" class="nav-item active" onclick="showCats()">
    <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
    <span>Categories</span>
  </a>
  <a href="/about" class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
    <span>About</span>
  </a>
</div>

<script>
const BASE_URL = window.location.origin;
let allEndpoints = [];

async function loadCats(){
  const res = await fetch('/api/categories');
  const data = await res.json();
  document.getElementById('catGrid').innerHTML = data.categories.map(c => `
    <div class="card" onclick="loadEps('${c.slug}')">
      <h3>${c.name}</h3>
      <p>${c.desc}</p>
      <span class="badge">${c.count} Endpoints</span>
    </div>
  `).join('');
}

async function loadEps(slug){
  const res = await fetch(`/api/endpoints?category=${slug}`);
  const data = await res.json();
  allEndpoints = data.endpoints;
  document.getElementById('catView').style.display = 'none';
  document.getElementById('epView').style.display = 'block';
  document.getElementById('catTitle').textContent = data.category;
  renderEndpoints(data.endpoints);
}

function renderEndpoints(endpoints){
  document.getElementById('epList').innerHTML = endpoints.map(e => `
    <div class="endpoint-card">
      <div class="ep-header" onclick="toggle('${e.path}')">
        <svg class="icon" viewBox="0 0 24 24"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg>
        <span class="method">${e.method}</span>
        <span class="ep-path">${e.path}</span>
      </div>
      <div class="ep-body" id="body-${e.path}">
        <div class="ep-section">
          <h4>
            <svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            TRY IT OUT
          </h4>
          ${e.params.map(p => `
            <div style="margin-bottom:16px">
              <label style="display:block;margin-bottom:8px;font-weight:600">${p.name} ${p.required?'*':''}</label>
              <input type="text" id="inp-${e.path}" placeholder="${p.desc}">
            </div>
          `).join('')}
          <button class="btn" onclick="test('${e.path}')">
            <svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            Execute
          </button>
        </div>

        <div class="ep-section">
          <h4>
            <svg class="icon" viewBox="0 0 24 24"><path d="M9.4 18L8 16.6l4.6-4.6L8 7.4 9.4 6l6 6-6 6z"/></svg>
            Code Examples
          </h4>
          <div class="tabs">
            <button class="tab active" onclick="switchTab(event,'curl-${e.path}')">cURL</button>
            <button class="tab" onclick="switchTab(event,'node-${e.path}')">Node.js</button>
            <button class="tab" onclick="switchTab(event,'sdk-${e.path}')">@nexus/api</button>
          </div>
          
          <div id="curl-${e.path}" class="code-tab">
            <div class="code-block">
              <button class="copy-btn" onclick="copyCode('curl-code-${e.path}')">Copy</button>
              <pre id="curl-code-${e.path}">curl -X GET "${BASE_URL}${e.path}?text=Hi"</pre>
            </div>
          </div>
          
          <div id="node-${e.path}" class="code-tab" style="display:none">
            <div class="code-block">
              <button class="copy-btn" onclick="copyCode('node-code-${e.path}')">Copy</button>
              <pre id="node-code-${e.path}">const res = await fetch("${BASE_URL}${e.path}?text=Hi");
const data = await res.json();</pre>
            </div>
          </div>
          
          <div id="sdk-${e.path}" class="code-tab" style="display:none">
            <div class="code-block">
              <button class="copy-btn" onclick="copyCode('sdk-code-${e.path}')">Copy</button>
              <pre id="sdk-code-${e.path}">import { Nexus } from '@nexus/api';
const res = await client.get('${e.path}', {text:'Hi'});</pre>
            </div>
          </div>
        </div>

        <div class="ep-section">
          <h4>Response</h4>
          <div class="code-block">
            <button class="copy-btn" onclick="copyCode('out-${e.path}')">Copy</button>
            <pre id="out-${e.path}">Click Execute</pre>
          </div>
        </div>

        <div class="ep-section">
          <h4>HTTP STATUS CODES</h4>
          <table class="status-table">
            <tr><td class="status-ok">200</td><td>OK - Request successful</td></tr>
            <tr><td class="status-err">400</td><td>Bad Request - Invalid parameters</td></tr>
            <tr><td class="status-err">405</td><td>Method Not Allowed</td></tr>
            <tr><td class="status-warn">429</td><td>Too Many Requests</td></tr>
            <tr><td class="status-err">500</td><td>Internal Server Error</td></tr>
          </table>
        </div>
      </div>
    </div>
  `).join('');
}

function searchApis(){
  const query = document.getElementById('searchInput').value.toLowerCase();
  if(!query){
    loadCats();
    return;
  }
  // Simple search by filtering categories
  const filtered = allEndpoints.filter(e => e.path.toLowerCase().includes(query));
  if(filtered.length > 0){
    document.getElementById('catView').style.display = 'none';
    document.getElementById('epView').style.display = 'block';
    document.getElementById('catTitle').textContent = 'Search Results';
    renderEndpoints(filtered);
  }
}

function toggle(path){
  document.getElementById(`body-${path}`).classList.toggle('active');
}

async function test(path){
  const val = document.getElementById(`inp-${path}`).value;
  const out = document.getElementById(`out-${path}`);
  out.textContent = 'Loading...';
  try{
    const res = await fetch(`${path}?text=${encodeURIComponent(val)}`);
    out.textContent = JSON.stringify(await res.json(),null,2);
  }catch(e){
    out.textContent = 'Error: '+e.message;
  }
}

function switchTab(e,id){
  const parent = e.target.parentElement.parentElement;
  parent.querySelectorAll('.code-tab').forEach(t=>t.style.display='none');
  parent.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).style.display='block';
  e.target.classList.add('active');
}

function copyCode(id){
  navigator.clipboard.writeText(document.getElementById(id).textContent);
  event.target.textContent = 'Copied!';
  setTimeout(()=>event.target.textContent='Copy',2000);
}

function showCats(){
  document.getElementById('epView').style.display='none';
  document.getElementById('catView').style.display='block';
}

loadCats();
</script>
</body>
</html>
