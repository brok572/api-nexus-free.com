<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>API Docs - Nexus</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #05010a;
  --card: rgba(20, 0, 35, 0.6);
  --border: #6d28d955;
  --purple: #a855f7;
  --pink: #ec4899;
  --text: #e5e7eb;
  --muted: #a78bfa;
}

* {margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}

html,body {
  width:100%;
  overflow-x:hidden;
}

body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}

body::before {
  content:'';
  position:fixed;
  inset:0;
  background: radial-gradient(circle at 20% 20%,#7c3aed33 0%,transparent 50%),
              radial-gradient(circle at 80% 80%,#ec489933 0%,transparent 50%);
  pointer-events:none;
  z-index:-1;
}

nav {
  padding:16px 20px;
  background:rgba(10,0,20,0.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav-left {
  display:flex;
  align-items:center;
  gap:10px;
}

.dots {
  display:flex;
  gap:5px;
}

.dot {
  width:7px;
  height:7px;
  border-radius:50%;
  background:linear-gradient(90deg,var(--purple),var(--pink));
}

.logo {
  font-size:20px;
  font-weight:800;
  background:linear-gradient(90deg,var(--purple),var(--pink));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.btn-sm {
  padding:8px 16px;
  background:linear-gradient(90deg,var(--purple),var(--pink));
  border:none;
  border-radius:8px;
  color:#0f172a;
  font-weight:700;
  cursor:pointer;
  font-size:13px;
}

.container {
  width:100%;
  max-width:1200px;
  margin:0 auto;
  padding:24px 16px;
}

.hero-banner {
  width:100%;
  height:200px;
  border-radius:16px;
  overflow:hidden;
  margin-bottom:24px;
  position:relative;
  border:1px solid var(--border);
}

.hero-banner img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero-overlay {
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,transparent 0%,rgba(5,1,10,0.9) 100%);
  display:flex;
  align-items:flex-end;
  padding:20px;
}

.hero-overlay h1 {
  font-size:28px;
  font-weight:800;
  background:linear-gradient(90deg,#c4b5fd,#f0abfc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  line-height:1.2;
}

.search-box {
  margin-bottom:32px;
}

.search-box input {
  width:100%;
  padding:14px 18px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  font-size:15px;
  backdrop-filter:blur(10px);
}

.search-box input:focus {
  outline:none;
  border-color:var(--purple);
  box-shadow:0 0 0 3px #a855f733;
}

h2 {
  font-size:32px;
  font-weight:800;
  margin-bottom:24px;
  background:linear-gradient(90deg,#c4b5fd,#f0abfc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:16px;
}

.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:24px;
  cursor:pointer;
  transition:0.3s;
  backdrop-filter:blur(10px);
}

.card:hover {
  transform:translateY(-4px);
  border-color:var(--purple);
  box-shadow:0 12px 30px #a855f733;
}

.card h3 {
  font-size:22px;
  font-weight:700;
  margin-bottom:10px;
  color:#f0abfc;
}

.card p {
  color:var(--muted);
  margin-bottom:12px;
  font-size:14px;
}

.badge {
  display:inline-block;
  padding:6px 14px;
  background:#7c3aed33;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
  color:#c4b5fd;
}

.endpoint-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  margin-bottom:16px;
  overflow:hidden;
  backdrop-filter:blur(10px);
}

.ep-header {
  padding:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.method {
  padding:5px 12px;
  border-radius:6px;
  font-size:11px;
  font-weight:800;
  background:linear-gradient(90deg,#22c55e,#16a34a);
  color:#000;
  flex-shrink:0;
}

.ep-path {
  font-family:'JetBrains Mono',monospace;
  font-size:14px;
  color:#c4b5fd;
  word-break:break-all;
}

.ep-body {
  display:none;
  border-top:1px solid var(--border);
}

.ep-body.active {display:block}

.ep-section {
  padding:20px;
  border-bottom:1px solid var(--border);
}

.ep-section:last-child {border-bottom:none}

.ep-section h4 {
  font-size:15px;
  font-weight:700;
  margin-bottom:12px;
  color:#d8b4fe;
  display:flex;
  align-items:center;
  gap:8px;
}

input[type="text"], input[type="file"] {
  width:100%;
  padding:12px 16px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(10,0,20,0.8);
  color:var(--text);
  font-size:14px;
  font-family:'JetBrains Mono',monospace;
}

.btn {
  padding:12px 24px;
  background:linear-gradient(90deg,var(--purple),var(--pink));
  border:none;
  border-radius:10px;
  color:#0f172a;
  font-weight:800;
  cursor:pointer;
  font-size:14px;
  display:inline-flex;
  align-items:center;
  gap:8px;
}

.tabs {
  display:flex;
  gap:4px;
  margin-bottom:12px;
  border-bottom:1px solid var(--border);
  overflow-x:auto;
}

.tab {
  padding:10px 16px;
  background:transparent;
  border:none;
  color:var(--muted);
  cursor:pointer;
  font-weight:600;
  border-bottom:2px solid transparent;
  white-space:nowrap;
  flex-shrink:0;
}

.tab.active {
  color:var(--text);
  border-bottom-color:var(--purple);
}

.code-block {
  background:#000;
  border-radius:10px;
  padding:16px;
  overflow-x:auto;
  position:relative;
}

.code-block pre {
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  color:#c4b5fd;
  white-space:pre-wrap;
  word-wrap:break-word;
}

.code-block img,.code-block audio {
  max-width:100%;
  border-radius:8px;
  display:block;
}

.copy-btn {
  position:absolute;
  top:10px;
  right:10px;
  padding:5px 10px;
  background:rgba(124,58,233,0.3);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);
  cursor:pointer;
  font-size:11px;
  font-weight:600;
}

.status-table {
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

.status-table td {
  padding:10px 12px;
  border-bottom:1px solid var(--border);
}

.bottom-nav {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:rgba(10,0,20,0.95);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;
  justify-content:space-around;
  padding:12px 0;
  z-index:100;
}

.nav-item {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  color:var(--muted);
  text-decoration:none;
  font-size:11px;
  font-weight:600;
}

.nav-item.active,
.nav-item:hover {
  color:var(--purple);
}

.nav-item svg {
  width:22px;
  height:22px;
  fill:currentColor;
}

.icon {
  width:18px;
  height:18px;
  fill:currentColor;
  flex-shrink:0;
}

.back {
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-bottom:20px;
  color:#a5b4fc;
  text-decoration:none;
  font-weight:600;
  font-size:14px;
}

@media(max-width:768px){
 .container{padding:20px 14px}
 .hero-banner{height:160px}
 .hero-overlay h1{font-size:22px}
  h2{font-size:26px}
 .grid{grid-template-columns:1fr}
 .ep-header{padding:14px}
 .ep-section{padding:16px}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="logo">Nexus</div>
  </div>
  <button class="btn-sm">Get Started</button>
</nav>

<div class="container">
  <div id="catView">
    <div class="hero-banner">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQfzl-IUu5HC18DZVE6dBV7lmj2iWt8CC4E7nBSFGxFZg&s=10" alt="Hero">
      <div class="hero-overlay">
        <h1>Explore 100+ Free APIs</h1>
      </div>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search APIs..." onkeyup="searchApis()">
    </div>

    <h2>Categories</h2>
    <div id="catGrid" class="grid"></div>
  </div>

  <div id="epView" style="display:none">
    <a href="#" class="back" onclick="showCats()">
      <svg class="icon" viewBox="0 0 24 24"><path d="M11.67 3.87L9.9 2.1 0 12l9.9 9.9 1.77-1.77L3.54 12z"/></svg>
      Back to Categories
    </a>
    <h2 id="catTitle"></h2>
    <div id="epList"></div>
  </div>
</div>

<div class="bottom-nav">
  <a href="/" class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>Home</span>
  </a>
  <a href="#" class="nav-item active" onclick="showCats()">
    <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
    <span>Categories</span>
  </a>
  <a href="/about" class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
    <span>About</span>
  </a>
</div>

<script>
const BASE_URL = window.location.origin;

async function loadCats(){
  try {
    const res = await fetch('/api/categories');
    const data = await res.json();
    document.getElementById('catGrid').innerHTML = data.categories.map(c => `
      <div class="card" onclick="loadEps('${c.slug}')">
        <h3>${c.name}</h3>
        <p>${c.desc}</p>
        <span class="badge">${c.count} Endpoints</span>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('catGrid').innerHTML = '<p style="color:#ef4444">Failed to load categories</p>';
  }
}

async function loadEps(slug){
  try {
    const res = await fetch(`/api/endpoints?category=${slug}`);
    const data = await res.json();
    document.getElementById('catView').style.display = 'none';
    document.getElementById('epView').style.display = 'block';
    document.getElementById('catTitle').textContent = data.category;
    renderEndpoints(data.endpoints);
  } catch(e) {
    alert('Failed to load endpoints');
  }
}

function renderEndpoints(endpoints){
  document.getElementById('epList').innerHTML = endpoints.map(e => {
    const inputFields = e.params.map(p => `
      <div style="margin-bottom:14px">
        <label style="display:block;margin-bottom:6px;font-weight:600;font-size:14px">
          ${p.name} ${p.required?'*':''}
          <span style="color:var(--muted);font-size:12px">(${p.type || 'text'})</span>
        </label>
        <input type="${p.type === 'file'? 'file' : 'text'}"
               id="inp-${e.path}"
               placeholder="${p.desc}"
               ${p.type === 'file'? 'accept="image/*,audio/*"' : ''}
               oninput="updateCode('${e.path}')">
      </div>
    `).join('');

    const exampleParam = e.params.find(p => p.type === 'text')?.name || 'text';
    const exampleValue = 'Hello';

    return `
    <div class="endpoint-card">
      <div class="ep-header" onclick="toggle('${e.path}')">
        <svg class="icon" viewBox="0 0 24 24"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg>
        <span class="method">${e.method}</span>
        <span class="ep-path">${e.path}</span>
      </div>
      <div class="ep-body" id="body-${e.path}">
        <div class="ep-section">
          <h4>
            <svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            TRY IT OUT
          </h4>
          ${inputFields}
          <button class="btn" onclick="test('${e.path}')">
            <svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            Execute
          </button>
        </div>

        <div class="ep-section">
          <h4>Code Examples</h4>
          <div class="tabs">
            <button class="tab active" onclick="switchTab(event,'curl-${e.path}')">cURL</button>
            <button class="tab" onclick="switchTab(event,'node-${e.path}')">Node.js</button>
            <button class="tab" onclick="switchTab(event,'js-${e.path}')">JavaScript</button>
          </div>

          <div id="curl-${e.path}" class="code-tab">
            <div class="code-block">
              <button class="copy-btn" onclick="copyCode('curl-code-${e.path}')">Copy</button>
              <pre id="curl-code-${e.path}">curl -X GET "${BASE_URL}${e.path}?${exampleParam}=${exampleValue}"</pre>
            </div>
          </div>

          <div id="node-${e.path}" class="code-tab" style="display:none">
            <div class="code-block">
              <button class="copy-btn" onclick="copyCode('node-code-${e.path}')">Copy</button>
              <pre id="node-code-${e.path}">const res = await fetch("${BASE_URL}${e.path}?${exampleParam}=${exampleValue}");
const data = await res.json();
console.log(data);</pre>
            </div>
          </div>

          <div id="js-${e.path}" class="code-tab" style="display:none">
            <div class="code-block">
              <button class="copy-btn" onclick="copyCode('js-code-${e.path}')">Copy</button>
              <pre id="js-code-${e.path}">fetch("${BASE_URL}${e.path}?${exampleParam}=${exampleValue}")
 .then(res => res.json())
 .then(data => console.log(data));</pre>
            </div>
          </div>
        </div>

        <div class="ep-section">
          <h4>Response</h4>
          <div id="response-${e.path}">
            <div class="code-block">
              <pre>Click Execute to test</pre>
            </div>
          </div>
        </div>

        <div class="ep-section">
          <h4>HTTP STATUS CODES</h4>
          <table class="status-table">
            <tr><td style="color:#22c55e">200</td><td>OK - Request successful</td></tr>
            <tr><td style="color:#ef4444">400</td><td>Bad Request</td></tr>
            <tr><td style="color:#ef4444">405</td><td>Method Not Allowed</td></tr>
            <tr><td style="color:#f59e0b">429</td><td>Too Many Requests</td></tr>
            <tr><td style="color:#ef4444">500</td><td>Internal Server Error</td></tr>
          </table>
        </div>
      </div>
    </div>
    `;
  }).join('');
}

function updateCode(path){
  const input = document.getElementById(`inp-${path}`);
  const exampleParam = 'text';
  const value = input.value || 'Hello';

  const curlCode = `curl -X GET "${BASE_URL}${path}?${exampleParam}=${encodeURIComponent(value)}"`;
  const nodeCode = `const res = await fetch("${BASE_URL}${path}?${exampleParam}=${encodeURIComponent(value)}");
const data = await res.json();
console.log(data);`;
  const jsCode = `fetch("${BASE_URL}${path}?${exampleParam}=${encodeURIComponent(value)}")
 .then(res => res.json())
 .then(data => console.log(data));`;

  const curlEl = document.getElementById(`curl-code-${path}`);
  const nodeEl = document.getElementById(`node-code-${path}`);
  const jsEl = document.getElementById(`js-code-${path}`);

  if(curlEl) curlEl.textContent = curlCode;
  if(nodeEl) nodeEl.textContent = nodeCode;
  if(jsEl) jsEl.textContent = jsCode;
}

async function test(path){
  const input = document.getElementById(`inp-${path}`);
  const outDiv = document.getElementById(`response-${path}`);
  outDiv.innerHTML = '<div class="code-block"><pre>Loading...</pre></div>';

  try {
    let url = path;
    let options = { method: 'GET' };

    if (input.type === 'file' && input.files[0]) {
      const formData = new FormData();
      formData.append('file', input.files[0]);
      url = path;
      options = { method: 'POST', body: formData };
    } else if (input.value) {
      url = `${path}?text=${encodeURIComponent(input.value)}`;
    }

    const res = await fetch(url, options);
    const contentType = res.headers.get('content-type') || '';

    if (contentType.includes('image/')) {
      const blob = await res.blob();
      const imgUrl = URL.createObjectURL(blob);
      outDiv.innerHTML = `
        <div class="code-block">
          <img src="${imgUrl}" alt="Response">
          <div style="margin-top:10px">
            <a href="${imgUrl}" target="_blank" class="btn" download>Download Image</a>
          </div>
        </div>
      `;
    } else if (contentType.includes('audio/')) {
      const blob = await res.blob();
      const audioUrl = URL.createObjectURL(blob);
      outDiv.innerHTML = `
        <div class="code-block">
          <audio controls src="${audioUrl}" style="width:100%"></audio>
          <div style="margin-top:10px">
            <a href="${audioUrl}" target="_blank" class="btn" download>Download Audio</a>
          </div>
        </div>
      `;
    } else {
      const data = await res.json();
      outDiv.innerHTML = `
        <div class="code-block">
          <button class="copy-btn" onclick="copyCode('json-${path}')">Copy</button>
          <pre id="json-${path}">${JSON.stringify(data, null, 2)}</pre>
        </div>
      `;
    }
  } catch(e) {
    outDiv.innerHTML = `<div class="code-block"><pre style="color:#ef4444">Error: ${e.message}</pre></div>`;
  }
}

function toggle(path){
  document.getElementById(`body-${path}`).classList.toggle('active');
}

function switchTab(e,id){
  const parent = e.target.closest('.ep-section');
  parent.querySelectorAll('.code-tab').forEach(t=>t.style.display='none');
  parent.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).style.display='block';
  e.target.classList.add('active');
}

function copyCode(id){
  navigator.clipboard.writeText(document.getElementById(id).textContent);
  event.target.textContent = 'Copied!';
  setTimeout(()=>event.target.textContent='Copy',2000);
}

function showCats(){
  document.getElementById('epView').style.display='none';
  document.getElementById('catView').style.display='block';
}

function searchApis(){
  const query = document.getElementById('searchInput').value.toLowerCase();
  if(!query){
    loadCats();
    return;
  }
}

loadCats();
</script>
</body>
</html>
